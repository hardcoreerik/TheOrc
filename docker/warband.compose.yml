# Native Phase 3B Warband. The daemon loads GGUF/LoRA assets in-process through
# LLamaSharp; there is deliberately no Ollama sidecar or host Docker socket.
#
# Publish first (swap linux-x64 for linux-arm64 where appropriate):
#   dotnet publish ../OrchestratorIDE.Daemon/OrchestratorIDE.Daemon.csproj \
#     -c Release -r linux-x64 --self-contained \
#     -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o .
#
# Place approved assets under ./models. Startup scans that directory and keeps
# worker execution disabled when no valid native model is available.
services:
  warband:
    build:
      context: .
      dockerfile: Dockerfile.warband
    image: theorc-warband:phase3b
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      Hive__NodeName: warband-1
      Hive__NativeModelRoot: /models
      Hive__NativeGpuLayers: "0"
      Hive__NativeVramMb: "0"
    volumes:
      - ./models:/models:ro
      - warband_state:/state
      - warband_artifacts:/artifacts
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 268435456
    ports:
      - "7078:7078"
      - "7079:7079"
    # GPU use is opt-in. Set NativeGpuLayers/NativeVramMb and enable the host's
    # NVIDIA container device configuration only after a native CUDA smoke test.

volumes:
  warband_state:
  warband_artifacts:
