    <text x="1110" y="650" fill="#86FF48" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">H3</text>
    <text x="1110" y="688" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">remote farm / judge</text>
    <text x="1110" y="718" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">Academy jobs + artifacts</text>
