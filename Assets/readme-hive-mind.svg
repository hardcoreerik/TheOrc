    <text x="200" y="300" fill="#86FF48" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">BIGRIG</text>
    <text x="200" y="338" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">remote Ollama host</text>
    <text x="200" y="368" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">best for heavy inference</text>

