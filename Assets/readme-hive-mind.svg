  <text x="100" y="170" fill="#8DEDB6" font-family="Segoe UI, Arial, sans-serif" font-size="26">Distributed TheOrc: Phase A host routing shipped, discovery and remote jobs planned</text>

  <g opacity="0.18" stroke="#1C825C" stroke-width="2">
