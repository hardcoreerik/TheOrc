<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1600" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#04070D"/>
      <stop offset="1" stop-color="#09141C"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#86FF48"/>
      <stop offset="1" stop-color="#0BE0C3"/>
    </linearGradient>
    <filter id="glow3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="920" rx="36" fill="url(#bg3)"/>
  <rect x="28" y="28" width="1544" height="864" rx="28" stroke="#153B2A" stroke-width="2"/>

