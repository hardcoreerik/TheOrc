<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05080D"/>
      <stop offset="1" stop-color="#07131A"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7CFF45"/>
      <stop offset="1" stop-color="#00E7A7"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#19D3FF"/>
      <stop offset="1" stop-color="#3CFF8D"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="36" fill="url(#bg)"/>
  <rect x="28" y="28" width="1544" height="844" rx="28" stroke="#153B2A" stroke-width="2"/>

  <g opacity="0.2" stroke="#1C7E57" stroke-width="2">
    <path d="M90 120H390L450 180H620"/>
    <path d="M120 780H320L360 740H540"/>
    <path d="M1410 140H1230L1190 180H980"/>
    <path d="M1470 760H1290L1240 710H1060"/>
    <path d="M240 450H1360"/>
  </g>

  <text x="100" y="120" fill="#F5F7FA" font-family="Segoe UI, Arial, sans-serif" font-size="60" font-weight="700">TheOrc System Map</text>
  <text x="100" y="170" fill="#7FE7B2" font-family="Segoe UI, Arial, sans-serif" font-size="26">From user goal to tool execution, swarm steering, dataset capture, and adapter training</text>

  <g filter="url(#glow)">
    <rect x="100" y="240" width="300" height="150" rx="22" fill="#0B141B" stroke="url(#cyan)" stroke-width="3"/>
    <text x="130" y="292" fill="#7CFF45" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">1. WPF Shell</text>
    <text x="130" y="330" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">MainWindow, panels, docs,</text>
    <text x="130" y="360" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">Help window, status bar</text>

    <rect x="470" y="200" width="320" height="190" rx="22" fill="#0B141B" stroke="url(#green)" stroke-width="3"/>
    <text x="500" y="252" fill="#7CFF45" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">2. Agent Runtime</text>
    <text x="500" y="292" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">AgentLoop + ToolRegistry</text>
    <text x="500" y="322" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">approvals, sandbox,</text>
    <text x="500" y="352" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">single-agent execution</text>

    <rect x="860" y="180" width="360" height="230" rx="22" fill="#0B141B" stroke="url(#green)" stroke-width="3"/>
    <text x="890" y="232" fill="#7CFF45" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">3. GOBLIN MIND</text>
    <text x="890" y="272" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">format fingerprinting</text>
    <text x="890" y="302" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">category boundaries</text>
    <text x="890" y="332" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">schema reduction</text>
    <text x="890" y="362" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">capability-aware steering</text>

    <rect x="1260" y="240" width="240" height="150" rx="22" fill="#0B141B" stroke="url(#cyan)" stroke-width="3"/>
    <text x="1290" y="292" fill="#7CFF45" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">4. Swarm</text>
    <text x="1290" y="330" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">Boss + goblins,</text>
    <text x="1290" y="360" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">metrics, retries</text>

    <rect x="250" y="560" width="360" height="190" rx="22" fill="#0B141B" stroke="url(#green)" stroke-width="3"/>
    <text x="280" y="612" fill="#7CFF45" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">5. Capture Layer</text>
    <text x="280" y="652" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">boss plans, rubric scores,</text>
    <text x="280" y="682" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">artifacts, training candidates</text>

    <rect x="690" y="540" width="360" height="210" rx="22" fill="#0B141B" stroke="url(#green)" stroke-width="3"/>
    <text x="720" y="592" fill="#7CFF45" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">6. Training Pit</text>
    <text x="720" y="632" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">prescreen, judge,</text>
    <text x="720" y="662" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">human review, manifest,</text>
    <text x="720" y="692" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">export, preflight</text>

    <rect x="1130" y="560" width="300" height="190" rx="22" fill="#0B141B" stroke="url(#cyan)" stroke-width="3"/>
    <text x="1160" y="612" fill="#7CFF45" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">7. ORC ACADEMY</text>
    <text x="1160" y="652" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">QLoRA training GUI,</text>
    <text x="1160" y="682" fill="#E8F2EE" font-family="Segoe UI, Arial, sans-serif" font-size="22">heartbeat, re-attach</text>
  </g>

  <g stroke="#7CFF45" stroke-width="5" stroke-linecap="round" opacity="0.9">
    <path d="M400 315H470"/>
    <path d="M790 295H860"/>
    <path d="M1220 295H1260"/>
    <path d="M1340 390V470H430V560"/>
    <path d="M610 655H690"/>
    <path d="M1050 655H1130"/>
  </g>

  <g fill="#7CFF45">
    <circle cx="400" cy="315" r="8"/>
    <circle cx="470" cy="315" r="8"/>
    <circle cx="790" cy="295" r="8"/>
    <circle cx="860" cy="295" r="8"/>
    <circle cx="1220" cy="295" r="8"/>
    <circle cx="1260" cy="295" r="8"/>
    <circle cx="430" cy="470" r="8"/>
    <circle cx="430" cy="560" r="8"/>
    <circle cx="610" cy="655" r="8"/>
    <circle cx="690" cy="655" r="8"/>
    <circle cx="1050" cy="655" r="8"/>
    <circle cx="1130" cy="655" r="8"/>
  </g>
</svg>
