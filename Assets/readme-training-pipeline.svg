<svg width="1600" height="960" viewBox="0 0 1600 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1600" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05080D"/>
      <stop offset="1" stop-color="#08151C"/>
    </linearGradient>
    <linearGradient id="lime2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8BFF44"/>
      <stop offset="1" stop-color="#13E9B4"/>
    </linearGradient>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="960" rx="36" fill="url(#bg2)"/>
  <rect x="26" y="26" width="1548" height="908" rx="28" stroke="#143927" stroke-width="2"/>

  <text x="100" y="120" fill="#F5F7FA" font-family="Segoe UI, Arial, sans-serif" font-size="60" font-weight="700">Training Pit Pipeline</text>
  <text x="100" y="170" fill="#86EABA" font-family="Segoe UI, Arial, sans-serif" font-size="26">How swarm plans become reviewed data and how reviewed data becomes a local adapter</text>

  <g opacity="0.2" stroke="#248C63" stroke-width="2">
    <path d="M120 250H1480"/>
    <path d="M120 770H1480"/>
  </g>

  <g filter="url(#glow2)">
    <rect x="90" y="250" width="220" height="140" rx="20" fill="#0A141B" stroke="url(#lime2)" stroke-width="3"/>
    <text x="120" y="298" fill="#8BFF44" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Capture</text>
    <text x="120" y="336" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="22">swarm runs</text>
    <text x="120" y="366" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="22">boss plans</text>

    <rect x="360" y="250" width="220" height="140" rx="20" fill="#0A141B" stroke="url(#lime2)" stroke-width="3"/>
    <text x="390" y="298" fill="#8BFF44" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Rubric</text>
    <text x="390" y="336" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="22">good / bad</text>
    <text x="390" y="366" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="22">score thresholds</text>

    <rect x="630" y="250" width="220" height="140" rx="20" fill="#0A141B" stroke="url(#lime2)" stroke-width="3"/>
    <text x="660" y="298" fill="#8BFF44" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Prescreen</text>
    <text x="660" y="336" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="22">fast triage</text>
    <text x="660" y="366" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="22">skip decided items</text>

    <rect x="900" y="250" width="220" height="140" rx="20" fill="#0A141B" stroke="url(#lime2)" stroke-width="3"/>
    <text x="930" y="298" fill="#8BFF44" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Judge</text>
    <text x="930" y="336" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="22">second pass</text>
    <text x="930" y="366" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="22">risk signals</text>

    <rect x="1170" y="250" width="300" height="140" rx="20" fill="#0A141B" stroke="url(#lime2)" stroke-width="3"/>
    <text x="1200" y="298" fill="#8BFF44" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Human Review</text>
    <text x="1200" y="336" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="22">approve / reject</text>
    <text x="1200" y="366" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="22">notes go into manifest</text>

    <rect x="180" y="560" width="280" height="160" rx="20" fill="#0A141B" stroke="#13E9B4" stroke-width="3"/>
    <text x="210" y="610" fill="#8BFF44" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Manifest Truth</text>
    <text x="210" y="648" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="24">900 train</text>
    <text x="210" y="680" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="24">87 eval</text>
    <text x="210" y="712" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="24">25 negative</text>

    <rect x="540" y="560" width="260" height="160" rx="20" fill="#0A141B" stroke="#13E9B4" stroke-width="3"/>
    <text x="570" y="610" fill="#8BFF44" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Export + Preflight</text>
    <text x="570" y="648" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="22">JSONL rebuild</text>
    <text x="570" y="678" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="22">validation</text>
    <text x="570" y="708" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="22">sanitization</text>

    <rect x="880" y="560" width="280" height="160" rx="20" fill="#0A141B" stroke="#13E9B4" stroke-width="3"/>
    <text x="910" y="610" fill="#8BFF44" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">ORC ACADEMY</text>
    <text x="910" y="648" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="22">VRAM cap</text>
    <text x="910" y="678" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="22">heartbeat</text>
    <text x="910" y="708" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="22">resume / re-attach</text>

    <rect x="1240" y="560" width="190" height="160" rx="20" fill="#0A141B" stroke="#13E9B4" stroke-width="3"/>
    <text x="1270" y="610" fill="#8BFF44" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Adapter</text>
    <text x="1270" y="648" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="22">LoRA output</text>
    <text x="1270" y="678" fill="#E7F4ED" font-family="Segoe UI, Arial, sans-serif" font-size="22">local deploy</text>
  </g>

  <g stroke="#7CFF45" stroke-width="5" stroke-linecap="round">
    <path d="M310 320H360"/>
    <path d="M580 320H630"/>
    <path d="M850 320H900"/>
    <path d="M1120 320H1170"/>
    <path d="M1320 390V500H320V560"/>
    <path d="M460 640H540"/>
    <path d="M800 640H880"/>
    <path d="M1160 640H1240"/>
  </g>

  <g fill="#7CFF45">
    <circle cx="310" cy="320" r="8"/>
    <circle cx="360" cy="320" r="8"/>
    <circle cx="580" cy="320" r="8"/>
    <circle cx="630" cy="320" r="8"/>
    <circle cx="850" cy="320" r="8"/>
    <circle cx="900" cy="320" r="8"/>
    <circle cx="1120" cy="320" r="8"/>
    <circle cx="1170" cy="320" r="8"/>
    <circle cx="320" cy="500" r="8"/>
    <circle cx="320" cy="560" r="8"/>
    <circle cx="460" cy="640" r="8"/>
    <circle cx="540" cy="640" r="8"/>
    <circle cx="800" cy="640" r="8"/>
    <circle cx="880" cy="640" r="8"/>
    <circle cx="1160" cy="640" r="8"/>
    <circle cx="1240" cy="640" r="8"/>
  </g>
</svg>
