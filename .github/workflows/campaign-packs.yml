name: Campaign Packs

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'docker/packs/**'
      - '.github/workflows/campaign-packs.yml'

permissions:
  contents: read
  packages: write

jobs:
  alien-signal-search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/theorc-pack-alien-signal-search
          tags: type=raw,value=1.0.0
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: docker/packs/alien-signal-search
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Record immutable image reference
        run: echo "ghcr.io/${{ github.repository_owner }}/theorc-pack-alien-signal-search@${{ steps.build.outputs.digest }}" | tee alien-image.txt
      - uses: actions/upload-artifact@v4
        with:
          name: alien-signal-search-image-digest
          path: alien-image.txt
