name: Release

# Fires when a version tag is pushed: git tag v1.2.3 && git push origin v1.2.3
# Also supports manual trigger for testing (workflow_dispatch will CREATE the tag).
on:
  push:
    tags:
      - 'v[0-9]*'

  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0) ‚Äî will be created if it does not exist'
        required: true
        default: 'v1.0.0'
      prerelease:
        description: 'Mark as pre-release?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write   # create releases + upload assets

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest

    steps:
      # ‚îÄ‚îÄ Checkout (full history for release notes) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ‚îÄ‚îÄ Resolve version from tag or dispatch input ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            $tag = '${{ github.event.inputs.tag }}'
          } else {
            $tag = $env:GITHUB_REF -replace '^refs/tags/', ''
          }
          $ver = $tag -replace '^v', ''

          # Validate: must look like N.N.N or N.N.N.N
          if ($ver -notmatch '^\d+\.\d+(\.\d+)?(\.\d+)?$') {
            Write-Error "Tag '$tag' does not look like a version number."
            exit 1
          }

          "TAG=$tag"         >> $env:GITHUB_OUTPUT
          "VERSION=$ver"     >> $env:GITHUB_OUTPUT
          "PRERELEASE=${{ github.event.inputs.prerelease || 'false' }}" >> $env:GITHUB_OUTPUT
          Write-Host "tag=$tag  version=$ver"

      # ‚îÄ‚îÄ Install .NET 10 ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ‚îÄ‚îÄ Restore (solution-level ‚Äî restores all three projects) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      # --runtime win-x64 is required so the assets file includes the win-x64
      # target; without it, the subsequent publish steps with --no-restore fail
      # with NETSDK1047 ("Assets file doesn't have a target for win-x64").
      - name: Restore
        run: dotnet restore OrchestratorIDE.slnx --runtime win-x64

      # ‚îÄ‚îÄ Publish OrchestratorIDE (main app, self-contained single-file) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Publish OrchestratorIDE
        shell: pwsh
        run: |
          $ver = '${{ steps.ver.outputs.VERSION }}'
          dotnet publish OrchestratorIDE/OrchestratorIDE.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained `
            --no-restore `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:Version=$ver `
            -p:AssemblyVersion=$ver `
            -p:FileVersion=$ver `
            --output publish/app

      # ‚îÄ‚îÄ Publish OrchestratorSetup (installer, self-contained single-file) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Publish OrchestratorSetup
        shell: pwsh
        run: |
          $ver = '${{ steps.ver.outputs.VERSION }}'
          dotnet publish OrchestratorSetup/OrchestratorSetup.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained `
            --no-restore `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:Version=$ver `
            -p:AssemblyVersion=$ver `
            -p:FileVersion=$ver `
            --output publish/setup

      # ‚îÄ‚îÄ Bundle portable zip (exe only ‚Äî first-run wizard handles .agent.md) ‚îÄ‚îÄ
      - name: Create portable zip
        shell: pwsh
        run: |
          $ver = '${{ steps.ver.outputs.VERSION }}'
          $zip = "publish/TheOrc-$ver-win-x64-portable.zip"

          Compress-Archive -Path "publish/app/OrchestratorIDE.exe" `
                           -DestinationPath $zip -CompressionLevel Optimal
          $mb = [math]::Round((Get-Item $zip).Length / 1MB, 1)
          Write-Host "Created $zip ($mb MB)"

      # ‚îÄ‚îÄ Diagnostics: list all publish artifacts ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: List artifacts
        shell: pwsh
        run: |
          Get-ChildItem publish -Recurse -File |
            Select-Object FullName,
              @{N='MB'; E={ [math]::Round($_.Length/1MB, 1) }} |
            Format-Table -AutoSize

      # ‚îÄ‚îÄ Verify the two required release assets exist ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Verify assets
        shell: pwsh
        run: |
          $required = @(
            "publish/app/OrchestratorIDE.exe",
            "publish/setup/OrchestratorSetup.exe"
          )
          $missing = $required | Where-Object { -not (Test-Path $_) }
          if ($missing) {
            Write-Error "Missing required assets:`n$($missing -join "`n")"
            exit 1
          }
          Write-Host "All required assets present."

      # ‚îÄ‚îÄ Create GitHub Release + upload assets ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.ver.outputs.TAG }}
          name:       "TheOrc ${{ steps.ver.outputs.TAG }}"
          prerelease: ${{ steps.ver.outputs.PRERELEASE == 'true' }}
          generate_release_notes: true
          body: |
            ## TheOrc ${{ steps.ver.outputs.TAG }}

            ### Quick start ‚Äî one-click install (recommended)
            1. Download **OrchestratorSetup.exe** below
            2. Run it ‚Äî the wizard detects your GPU, downloads the right runtime and model, configures everything
            3. Launch from the Desktop shortcut

            ### Portable / manual install
            Download **TheOrc-${{ steps.ver.outputs.VERSION }}-win-x64-portable.zip** for a pre-built exe you can drop anywhere.
            Requires an existing llama.cpp runtime or Ollama configured in Settings.

            ### System requirements
            - Windows 10 / 11 (x64)
            - No .NET installation required ‚Äî fully self-contained
            - GPU: NVIDIA RTX (CUDA 12), AMD (Vulkan), or CPU-only (AVX2 / baseline)

            ---
            *Built automatically from `${{ steps.ver.outputs.TAG }}` ¬∑ .NET 10 ¬∑ [Source](https://github.com/hardcoreerik/TheOrc)*
          files: |
            publish/setup/OrchestratorSetup.exe
            publish/app/OrchestratorIDE.exe
            publish/TheOrc-${{ steps.ver.outputs.VERSION }}-win-x64-portable.zip
