name: Release

# Fires when a version tag is pushed: git tag v1.2.3 && git push origin v1.2.3
# Also supports manual trigger for testing (workflow_dispatch will CREATE the tag).
on:
  push:
    tags:
      - 'v[0-9]*'

  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0) — will be created if it does not exist'
        required: true
        default: 'v1.0.0'
      prerelease:
        description: 'Mark as pre-release?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write   # create releases + upload assets

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest

    steps:
      # ── Checkout (full history for release notes) ─────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Resolve version from tag or dispatch input ────────────────────────────
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            $tag = '${{ github.event.inputs.tag }}'
          } else {
            $tag = $env:GITHUB_REF -replace '^refs/tags/', ''
          }
          $ver = $tag -replace '^v', ''

          # Validate: must look like N.N.N or N.N.N.N
          if ($ver -notmatch '^\d+\.\d+(\.\d+)?(\.\d+)?$') {
            Write-Error "Tag '$tag' does not look like a version number."
            exit 1
          }

          "TAG=$tag"         >> $env:GITHUB_OUTPUT
          "VERSION=$ver"     >> $env:GITHUB_OUTPUT
          "PRERELEASE=${{ github.event.inputs.prerelease || 'false' }}" >> $env:GITHUB_OUTPUT
          Write-Host "tag=$tag  version=$ver"

      # ── Install .NET 10 ───────────────────────────────────────────────────────
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ── Restore (solution-level — restores all three projects) ────────────────
      # --runtime win-x64 is required so the assets file includes the win-x64
      # target; without it, the subsequent publish steps with --no-restore fail
      # with NETSDK1047 ("Assets file doesn't have a target for win-x64").
      - name: Restore
        run: dotnet restore OrchestratorIDE.slnx --runtime win-x64

      # ── Publish OrchestratorIDE (Avalonia shell, self-contained single-file) ──
      # Publishes OrchestratorIDE.Avalonia.csproj, not the WPF project — WPF
      # retirement Phase 4.5 (docs/WPF_RETIREMENT_CHECKLIST.md). The
      # output filename is pinned to OrchestratorIDE.exe via -p:AssemblyName
      # so every downstream step (zip, asset verification, release notes,
      # OrchestratorSetup's installer/shortcut logic, SelfUpdater) keeps
      # working unchanged — only the source project being published changed.
      # -p:OutputType=WinExe overrides the Avalonia csproj's dev-time `Exe`
      # (console-attached, useful for `dotnet run` diagnostics) so the
      # shipped binary doesn't flash a console window like a dev build would.
      - name: Publish OrchestratorIDE
        shell: pwsh
        run: |
          $ver = '${{ steps.ver.outputs.VERSION }}'
          dotnet publish OrchestratorIDE.Avalonia/OrchestratorIDE.Avalonia.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained `
            --no-restore `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:Version=$ver `
            -p:AssemblyVersion=$ver `
            -p:FileVersion=$ver `
            -p:AssemblyName=OrchestratorIDE `
            -p:OutputType=WinExe `
            --output publish/app

      # ── Publish OrchestratorSetup (installer, self-contained single-file) ─────
      - name: Publish OrchestratorSetup
        shell: pwsh
        run: |
          $ver = '${{ steps.ver.outputs.VERSION }}'
          dotnet publish OrchestratorSetup/OrchestratorSetup.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained `
            --no-restore `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:Version=$ver `
            -p:AssemblyVersion=$ver `
            -p:FileVersion=$ver `
            --output publish/setup

      # ── Bundle portable zip (both exes — setup wizard works on fresh machines) ─
      - name: Create portable zip
        shell: pwsh
        run: |
          $ver = '${{ steps.ver.outputs.VERSION }}'
          $zip = "publish/TheOrc-$ver-win-x64-portable.zip"

          # Bundle the main app + installer so the portable zip is self-sufficient
          # on a fresh machine with no llama.cpp / Ollama pre-installed.
          Compress-Archive -Path @(
            "publish/app/OrchestratorIDE.exe",
            "publish/setup/OrchestratorSetup.exe"
          ) -DestinationPath $zip -CompressionLevel Optimal
          $mb = [math]::Round((Get-Item $zip).Length / 1MB, 1)
          Write-Host "Created $zip ($mb MB)"

      # ── Diagnostics: list all publish artifacts ───────────────────────────────
      - name: List artifacts
        shell: pwsh
        run: |
          Get-ChildItem publish -Recurse -File |
            Select-Object FullName,
              @{N='MB'; E={ [math]::Round($_.Length/1MB, 1) }} |
            Format-Table -AutoSize

      # ── Verify the two required release assets exist ──────────────────────────
      - name: Verify assets
        shell: pwsh
        run: |
          $required = @(
            "publish/app/OrchestratorIDE.exe",
            "publish/setup/OrchestratorSetup.exe"
          )
          $missing = $required | Where-Object { -not (Test-Path $_) }
          if ($missing) {
            Write-Error "Missing required assets:`n$($missing -join "`n")"
            exit 1
          }
          Write-Host "All required assets present."

      # ── Extract "What's new in vX.X" from README into release body ─────────────
      # Reads README.md, finds the section "## What's new in vVERSION" and captures
      # everything up to the next "## " heading.  Falls back gracefully if not found.
      - name: Build release notes
        id: notes
        shell: pwsh
        run: |
          $ver  = '${{ steps.ver.outputs.VERSION }}'
          $tag  = '${{ steps.ver.outputs.TAG }}'
          $readme = Get-Content README.md -Raw

          # Extract the "What's new in vX.X" block
          $header  = "## What's new in v$($ver -replace '\.\d+$','')"   # e.g. "v1.6"
          $pattern = "(?ms)$([regex]::Escape($header))\s*\n(.*?)(?=\n## |\z)"
          $match   = [regex]::Match($readme, $pattern)
          $whatsNew = if ($match.Success) { $match.Groups[1].Value.Trim() } else { "" }

          # Previous tag for the compare link
          $prevTag = git describe --tags --abbrev=0 "$tag^" 2>$null
          $compareLink = if ($prevTag) {
            "**Full changelog:** [$prevTag...$tag](https://github.com/hardcoreerik/TheOrc/compare/$prevTag...$tag)"
          } else { "" }

          $body = @"
          <div align="center">
          <img src="https://raw.githubusercontent.com/hardcoreerik/TheOrc/master/Assets/release.png" width="480" alt="TheOrc — Build Complete"/>
          </div>

          ## TheOrc $tag

          > 100% local AI coding assistant — no cloud, no subscriptions, no data leaving your machine.

          ---

          ### What's new in $tag

          $whatsNew

          ---

          ### ⚡ Quick start — one-click install (recommended)
          1. Download **OrchestratorSetup.exe** below
          2. Run it — the wizard detects your GPU, downloads the right runtime and model, configures everything
          3. Launch from the Desktop shortcut or Start Menu

          ### 📦 Portable install — works on fresh machines
          Download **TheOrc-$ver-win-x64-portable.zip** — contains both ``OrchestratorIDE.exe`` and ``OrchestratorSetup.exe``.
          1. Extract both files to the same folder
          2. Run ``OrchestratorIDE.exe``
          3. If no AI runtime is detected, the app offers to launch the setup wizard automatically — no prior AI tools required

          ### 🖥️ System requirements
          | | |
          |---|---|
          | **OS** | Windows 10 / 11 (x64) |
          | **.NET** | Not required — fully self-contained |
          | **GPU** | NVIDIA RTX (CUDA 12) · AMD (Vulkan) · CPU-only (AVX2 / baseline) |
          | **RAM** | 8 GB minimum · 16 GB recommended |

          ---

          $compareLink

          *Built from ``$tag`` · .NET 10 · [Source](https://github.com/hardcoreerik/TheOrc) · [Support the Orc ☕](https://ko-fi.com/hardcoreerik)*
          "@

          # Write to a temp file — avoids multiline env-var escaping issues
          $body | Set-Content release-notes.md -Encoding UTF8
          Write-Host "Release notes written ($($body.Length) chars)"

      # ── Create GitHub Release + upload assets ─────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.ver.outputs.TAG }}
          name:       "TheOrc ${{ steps.ver.outputs.TAG }}"
          prerelease: ${{ steps.ver.outputs.PRERELEASE == 'true' }}
          body_path:  release-notes.md
          files: |
            publish/setup/OrchestratorSetup.exe
            publish/app/OrchestratorIDE.exe
            publish/TheOrc-${{ steps.ver.outputs.VERSION }}-win-x64-portable.zip
