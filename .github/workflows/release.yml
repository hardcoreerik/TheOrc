name: Release

# Fires when a version tag is pushed: git tag v1.2.3 && git push origin v1.2.3
# Also supports manual trigger for testing (workflow_dispatch will CREATE the tag).
on:
  push:
    tags:
      - 'v[0-9]*'

  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0) — will be created if it does not exist'
        required: true
        default: 'v1.0.0'
      prerelease:
        description: 'Mark as pre-release?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write   # create releases + upload assets

jobs:
  release:
    name: Build & Release (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}

    # Each matrix leg builds its own OS's assets, then calls action-gh-release against the
    # SAME tag -- it creates the release on first call and appends assets on subsequent calls,
    # so there's no need for a separate job-dependency graph just to merge two OSes' files into
    # one release. Both legs write the IDENTICAL release-notes.md body (covering every OS),
    # not leg-specific bodies, so whichever leg's action-gh-release call lands doesn't matter --
    # neither one clobbers the other's instructions.
    #
    # concurrency below is the actual fix for the real race this shape creates (grok review
    # BLOCKER, 2026-06-21): without it, both matrix legs run in parallel and can both reach
    # "create release for this tag" at the same instant -- one create succeeds, the other 422s
    # against an action that wasn't designed to retry-as-update against its OWN concurrent
    # collision, silently dropping that OS's assets from the release. Serializing the whole
    # job per-tag means one leg's build+publish+release-append fully completes before the next
    # leg even starts building -- slower (a few extra minutes total), but the assets are this
    # workflow's actual deliverable, so correctness beats parallelism here.
    concurrency:
      group: release-${{ github.ref }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
            # macos-latest GitHub runners are Apple Silicon (osx-arm64) as of 2023+; an
            # osx-x64 leg for Intel Macs is a deliberately separate, not-yet-added phase
            # (docs/MULTI_OS_RELEASE_SPEC.md Phase A) -- first get ONE real Mac artifact
            # shipping and tested before doubling the matrix.

    steps:
      # ── Checkout (full history for release notes) ─────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Resolve version from tag or dispatch input ────────────────────────────
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            $tag = '${{ github.event.inputs.tag }}'
          } else {
            $tag = $env:GITHUB_REF -replace '^refs/tags/', ''
          }
          $ver = $tag -replace '^v', ''

          # Validate: must look like N.N.N or N.N.N.N
          if ($ver -notmatch '^\d+\.\d+(\.\d+)?(\.\d+)?$') {
            Write-Error "Tag '$tag' does not look like a version number."
            exit 1
          }

          "TAG=$tag"         >> $env:GITHUB_OUTPUT
          "VERSION=$ver"     >> $env:GITHUB_OUTPUT
          "PRERELEASE=${{ github.event.inputs.prerelease || 'false' }}" >> $env:GITHUB_OUTPUT
          Write-Host "tag=$tag  version=$ver"

      # ── Install .NET 10 ───────────────────────────────────────────────────────
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ── Restore (RID-specific so the assets file includes this leg's target;
      #    without it, --no-restore publish below fails with NETSDK1047) ─────────
      - name: Restore
        run: dotnet restore OrchestratorIDE.slnx --runtime ${{ matrix.rid }}

      # ── Publish OrchestratorIDE (Avalonia shell, self-contained single-file) ──
      # AssemblyName is NOT overridden via -p: here -- OrchestratorIDE.Avalonia.csproj
      # references OrchestratorIDE.NativeRuntime, which has its own explicit
      # <AssemblyName>; a global -p:AssemblyName=OrchestratorIDE cascades into that
      # ProjectReference during NuGet's static-graph restore (UndefineProperties on the
      # reference doesn't fully suppress it) and fails with "Ambiguous project name
      # 'OrchestratorIDE'". Instead we publish under the project's natural name
      # (OrchestratorIDE.Avalonia[.exe]) and rename the output file below -- same final
      # artifact name every downstream step (zip, OrchestratorSetup, SelfUpdater) expects.
      # -p:OutputType=WinExe avoids a flashing console window on Windows; on macOS there's no
      # such concern (and no .app bundle yet -- docs/MULTI_OS_RELEASE_SPEC.md Phase A explicitly
      # defers that -- so the binary stays console-attached, fine for a Terminal-launched app).
      - name: Publish OrchestratorIDE (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = '${{ steps.ver.outputs.VERSION }}'
          # IncludeAllContentForSelfExtract (NOT IncludeNativeLibrariesForSelfExtract): the latter
          # leaves AppContext.BaseDirectory pointing at the exe dir while LLamaSharp's native DLLs
          # extract to a temp dir, so its './'-relative backend probing finds nothing and every
          # model load dies with TypeInitializationException on NativeApi. All-content makes the
          # bundle run FROM the extraction dir, so BaseDirectory == where the natives are and the
          # CUDA/CPU backends load. Verified 2026-06-30 with Tools/NativeProbe.
          dotnet publish OrchestratorIDE.Avalonia/OrchestratorIDE.Avalonia.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained `
            --no-restore `
            -p:PublishSingleFile=true `
            -p:IncludeAllContentForSelfExtract=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:Version=$ver `
            -p:AssemblyVersion=$ver `
            -p:FileVersion=$ver `
            -p:OutputType=WinExe `
            --output publish/app
          Move-Item publish/app/OrchestratorIDE.Avalonia.exe publish/app/OrchestratorIDE.exe -Force

      - name: Publish OrchestratorIDE (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ver='${{ steps.ver.outputs.VERSION }}'
          # All-content (not native-only) self-extract so LLamaSharp's relative backend probing
          # finds the extracted natives -- see the Windows app publish step above for why.
          dotnet publish OrchestratorIDE.Avalonia/OrchestratorIDE.Avalonia.csproj \
            --configuration Release \
            --runtime osx-arm64 \
            --self-contained \
            --no-restore \
            -p:PublishSingleFile=true \
            -p:IncludeAllContentForSelfExtract=true \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -p:Version=$ver \
            -p:AssemblyVersion=$ver \
            -p:FileVersion=$ver \
            --output publish/app
          mv publish/app/OrchestratorIDE.Avalonia publish/app/OrchestratorIDE
          chmod +x publish/app/OrchestratorIDE

      # ── Publish OrchestratorSetup (installer, self-contained single-file) ─────
      - name: Publish OrchestratorSetup (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = '${{ steps.ver.outputs.VERSION }}'
          dotnet publish OrchestratorSetup/OrchestratorSetup.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained `
            --no-restore `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:Version=$ver `
            -p:AssemblyVersion=$ver `
            -p:FileVersion=$ver `
            --output publish/setup

      - name: Publish OrchestratorSetup (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ver='${{ steps.ver.outputs.VERSION }}'
          dotnet publish OrchestratorSetup/OrchestratorSetup.csproj \
            --configuration Release \
            --runtime osx-arm64 \
            --self-contained \
            --no-restore \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -p:Version=$ver \
            -p:AssemblyVersion=$ver \
            -p:FileVersion=$ver \
            --output publish/setup
          chmod +x publish/setup/OrchestratorSetup

      # ── Bundle portable archive (both exes — setup wizard works on fresh machines) ─
      # tar.gz on macOS, not zip -- Compress-Archive/most zip tooling doesn't reliably
      # preserve the Unix executable bit, which matters for a self-contained binary that
      # needs +x the moment it's extracted (docs/MULTI_OS_RELEASE_SPEC.md Phase A).
      - name: Create portable archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = '${{ steps.ver.outputs.VERSION }}'
          $zip = "publish/TheOrc-$ver-win-x64-portable.zip"
          Compress-Archive -Path @(
            "publish/app/OrchestratorIDE.exe",
            "publish/setup/OrchestratorSetup.exe"
          ) -DestinationPath $zip -CompressionLevel Optimal
          $mb = [math]::Round((Get-Item $zip).Length / 1MB, 1)
          Write-Host "Created $zip ($mb MB)"

      - name: Create portable archive (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ver='${{ steps.ver.outputs.VERSION }}'
          # Stage flat -- `tar -C publish app/OrchestratorIDE setup/OrchestratorSetup` would
          # preserve the app/ and setup/ subdirectories as archive members, but the release
          # notes say "tar -xzf it, both binaries are already executable" matching the Windows
          # zip's flat-root layout (Compress-Archive there is given individual file paths, not
          # folders, so it's flat too) -- a nested mac archive would silently contradict that
          # instruction (grok review BLOCKER, 2026-06-21).
          mkdir -p publish/portable
          cp publish/app/OrchestratorIDE publish/portable/OrchestratorIDE
          cp publish/setup/OrchestratorSetup publish/portable/OrchestratorSetup
          tarball="publish/TheOrc-$ver-osx-arm64-portable.tar.gz"
          tar -czf "$tarball" -C publish/portable OrchestratorIDE OrchestratorSetup
          mb=$(echo "scale=1; $(stat -f%z "$tarball") / 1048576" | bc)
          echo "Created $tarball (${mb} MB)"

      # ── Diagnostics: list all publish artifacts ───────────────────────────────
      - name: List artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem publish -Recurse -File |
            Select-Object FullName,
              @{N='MB'; E={ [math]::Round($_.Length/1MB, 1) }} |
            Format-Table -AutoSize

      - name: List artifacts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: find publish -type f -exec ls -lh {} \;

      # ── Verify this leg's required release assets exist ───────────────────────
      - name: Verify assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = '${{ steps.ver.outputs.VERSION }}'
          $required = @(
            "publish/app/OrchestratorIDE.exe",
            "publish/setup/OrchestratorSetup.exe",
            "publish/TheOrc-$ver-win-x64-portable.zip"
          )
          $missing = $required | Where-Object { -not (Test-Path $_) }
          if ($missing) {
            Write-Error "Missing required assets:`n$($missing -join "`n")"
            exit 1
          }
          Write-Host "All required assets present."

      - name: Verify assets (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ver='${{ steps.ver.outputs.VERSION }}'
          required=(
            "publish/app/OrchestratorIDE"
            "publish/setup/OrchestratorSetup"
            "publish/TheOrc-$ver-osx-arm64-portable.tar.gz"
          )
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "Missing required asset: $f" >&2
              exit 1
            fi
          done
          echo "All required assets present."

      # ── Extract "What's new in vX.Y.Z" from README into release body ───────────
      # Reads README.md, finds the section "## What's new in vFULL_VERSION" (exact match,
      # patch included -- each shipped patch gets its OWN top-level "##" heading in README.md,
      # not nested under a shared minor-version umbrella) and captures everything up to the
      # next "## " heading. Falls back gracefully if not found.
      # Runs identically on both legs -- same full multi-OS body either way, so whichever
      # leg's action-gh-release call lands first or second doesn't matter.
      - name: Build release notes
        id: notes
        shell: pwsh
        run: |
          $ver  = '${{ steps.ver.outputs.VERSION }}'
          $tag  = '${{ steps.ver.outputs.TAG }}'
          $readme = Get-Content README.md -Raw

          # Extract the "What's new in vX.Y.Z" block -- exact full version, no stripping.
          # Older releases (pre-v1.9.4) grouped multiple patches under one "## What's new in
          # vX.Y" umbrella with "###" subsections; that convention is retired going forward
          # since it meant every patch's release page showed the ENTIRE minor version's
          # history instead of just what changed in that patch (found when v1.9.5's actual
          # release page showed v1.9.0 through v1.9.5's full text). Each patch from v1.9.0
          # onward that's been retroactively re-split, plus every patch going forward, gets
          # its own top-level "##" heading instead.
          $header  = "## What's new in v$ver"
          $pattern = "(?ms)$([regex]::Escape($header))\s*\n(.*?)(?=\n## |\z)"
          $match   = [regex]::Match($readme, $pattern)
          $whatsNew = if ($match.Success) { $match.Groups[1].Value.Trim() } else { "" }

          # Previous tag for the compare link
          $prevTag = git describe --tags --abbrev=0 "$tag^" 2>$null
          $compareLink = if ($prevTag) {
            "**Full changelog:** [$prevTag...$tag](https://github.com/hardcoreerik/TheOrc/compare/$prevTag...$tag)"
          } else { "" }

          $body = @"
          <div align="center">
          <img src="https://raw.githubusercontent.com/hardcoreerik/TheOrc/master/Assets/release.png" width="480" alt="TheOrc — Build Complete"/>
          </div>

          ## TheOrc $tag

          > 100% local AI coding assistant — no cloud, no subscriptions, no data leaving your machine.

          ---

          ### What's new in $tag

          $whatsNew

          ---

          ### 🪟 Windows — one-click install (recommended)
          1. Download **OrchestratorSetup.exe** below
          2. Run it — the wizard detects your GPU, downloads the right runtime and model, configures everything
          3. Launch from the Desktop shortcut or Start Menu

          **Portable**: download ``TheOrc-$ver-win-x64-portable.zip`` instead — contains both ``OrchestratorIDE.exe`` and ``OrchestratorSetup.exe``, extract both to the same folder, run ``OrchestratorIDE.exe``.

          ### 🍎 macOS (Apple Silicon)
          1. Download **OrchestratorSetup** below (no extension)
          2. In Terminal: ``chmod +x OrchestratorSetup && ./OrchestratorSetup``
          3. **First launch will show a Gatekeeper warning** ("cannot be opened because the developer cannot be verified") — this build isn't code-signed yet. Right-click the file → Open, or run ``xattr -d com.apple.quarantine OrchestratorSetup`` first.
          4. The wizard detects your hardware, downloads the right runtime and model, configures everything

          **Portable**: download ``TheOrc-$ver-osx-arm64-portable.tar.gz`` instead — ``tar -xzf`` it, both binaries are already executable.

          Intel Macs (``osx-x64``) aren't built yet — only Apple Silicon.

          ### 🖥️ System requirements
          | | |
          |---|---|
          | **OS** | Windows 10/11 (x64) · macOS (Apple Silicon) |
          | **.NET** | Not required — fully self-contained |
          | **GPU** | NVIDIA RTX (CUDA 12) · AMD (Vulkan) · Apple Silicon (Metal) · CPU-only (AVX2 / baseline) |
          | **RAM** | 8 GB minimum · 16 GB recommended |

          ---

          $compareLink

          *Built from ``$tag`` · .NET 10 · [Source](https://github.com/hardcoreerik/TheOrc) · [Support the Orc ☕](https://ko-fi.com/hardcoreerik)*
          "@

          # Write to a temp file — avoids multiline env-var escaping issues
          $body | Set-Content release-notes.md -Encoding UTF8
          Write-Host "Release notes written ($($body.Length) chars)"

      # ── Create/append to GitHub Release ────────────────────────────────────────
      - name: Create GitHub Release (Windows assets)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.ver.outputs.TAG }}
          name:       "TheOrc ${{ steps.ver.outputs.TAG }}"
          prerelease: ${{ steps.ver.outputs.PRERELEASE == 'true' }}
          body_path:  release-notes.md
          files: |
            publish/setup/OrchestratorSetup.exe
            publish/app/OrchestratorIDE.exe
            publish/TheOrc-${{ steps.ver.outputs.VERSION }}-win-x64-portable.zip

      - name: Create GitHub Release (macOS assets)
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.ver.outputs.TAG }}
          name:       "TheOrc ${{ steps.ver.outputs.TAG }}"
          prerelease: ${{ steps.ver.outputs.PRERELEASE == 'true' }}
          body_path:  release-notes.md
          files: |
            publish/setup/OrchestratorSetup
            publish/app/OrchestratorIDE
            publish/TheOrc-${{ steps.ver.outputs.VERSION }}-osx-arm64-portable.tar.gz

  # ── Warband (theorc-warband, OrchestratorIDE.Daemon) — separate, additive job ──────
  # docs/ROADMAP.md WARBANDS table: "CI publish matrix for linux-x64 + osx-arm64 Warband
  # binaries | v1.9 / v2.0" -- listed pending, not yet built. Kept as its own job rather than
  # folding into the `release` matrix above: the Warband is small, lightweight, and has no
  # Avalonia/native-runtime dependency at all (deliberately decoupled, see
  # OrchestratorIDE.Daemon's own csproj history) -- a Linux runner only ever needs to build
  # this one binary, not the full app+installer+portable-archive pipeline above, and keeping
  # it separate means zero risk of touching the `release` job's already-shipped, already-
  # working conditional logic for a release that just went out successfully (v1.10.0).
  #
  # Real ARM64 Linux hardware was the actual test target all day (a Raspberry Pi 4,
  # cross-compiled and deployed manually) -- this job intentionally matches the ROADMAP table's
  # literal scope (linux-x64 + osx-arm64) rather than adding linux-arm64 unprompted; widening
  # the matrix to cover real Pi-class hardware via CI is a separate decision, not bundled here.
  #
  # `needs: release` is load-bearing, NOT just ordering. This job shares the SAME
  # `concurrency.group` as `release` so their action-gh-release calls serialize (preventing the
  # create-race that drops assets). But a concurrency group keeps only ONE running + ONE pending
  # entry — a third pending entry cancels the older pending one. With `release` (2 legs) and
  # `warband` (2 legs) ALL eligible at once, four legs hit one group and two get CANCELLED as
  # superseded (observed for real on the v1.11.0 tag: win-x64 + linux-x64 warband cancelled,
  # shipping a Windows-less release). Gating warband behind `release` means at most two legs ever
  # contend the group at a time (release's two, then warband's two), so the 1-running+1-pending
  # limit is never exceeded — no cancellation — while the serialization (no create-race) is kept.
  warband:
    name: Build & Release Warband (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    needs: release

    concurrency:
      group: release-${{ github.ref }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          ver="${tag#v}"

          if ! [[ "$ver" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?(\.[0-9]+)?$ ]]; then
            echo "Tag '$tag' does not look like a version number." >&2
            exit 1
          fi

          echo "TAG=$tag" >> "$GITHUB_OUTPUT"
          echo "VERSION=$ver" >> "$GITHUB_OUTPUT"
          echo "PRERELEASE=${{ github.event.inputs.prerelease || 'false' }}" >> "$GITHUB_OUTPUT"
          echo "tag=$tag  version=$ver"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore OrchestratorIDE.Daemon/OrchestratorIDE.Daemon.csproj --runtime ${{ matrix.rid }}

      - name: Publish theorc-warband
        shell: bash
        run: |
          ver='${{ steps.ver.outputs.VERSION }}'
          # All-content (not native-only) self-extract -- the daemon runs CF-6 native worker tasks,
          # so it hits the same LLamaSharp backend-probing issue as the app. See the Windows app
          # publish step above for the full explanation.
          dotnet publish OrchestratorIDE.Daemon/OrchestratorIDE.Daemon.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained \
            --no-restore \
            -p:PublishSingleFile=true \
            -p:IncludeAllContentForSelfExtract=true \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -p:Version=$ver \
            -p:AssemblyVersion=$ver \
            -p:FileVersion=$ver \
            --output publish/warband
          chmod +x publish/warband/theorc-warband

      # tar.gz, not zip -- same reasoning as the app/installer portable archive above: needs
      # to preserve the Unix executable bit through extraction, and this binary has none of
      # the app/installer's Windows-only audience to also serve.
      - name: Create portable archive
        shell: bash
        run: |
          ver='${{ steps.ver.outputs.VERSION }}'
          tarball="publish/theorc-warband-$ver-${{ matrix.rid }}.tar.gz"
          tar -czf "$tarball" -C publish/warband theorc-warband
          echo "Created $tarball"

      - name: Verify assets
        shell: bash
        run: |
          ver='${{ steps.ver.outputs.VERSION }}'
          required=(
            "publish/warband/theorc-warband"
            "publish/theorc-warband-$ver-${{ matrix.rid }}.tar.gz"
          )
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "Missing required asset: $f" >&2
              exit 1
            fi
          done
          echo "All required assets present."

      # Same body_path-every-time approach as the release job's two legs, deliberately not
      # omitted -- softprops/action-gh-release's documented append-on-existing-release
      # behavior when body/body_path IS provided is already proven by the release job above;
      # relying on its undocumented-here behavior for an OMITTED body on a brand new job
      # instead of reusing the exact same proven pattern is an avoidable risk for a job that's
      # never had a real run yet.
      - name: Build release notes
        id: notes
        shell: bash
        run: |
          ver='${{ steps.ver.outputs.VERSION }}'
          tag='${{ steps.ver.outputs.TAG }}'

          header="## What's new in v$ver"
          whatsNew=$(awk -v hdr="$header" '
            $0 == hdr { found=1; next }
            found && /^## / { exit }
            found { print }
          ' README.md | sed -e 's/[[:space:]]*$//' )

          prevTag=$(git describe --tags --abbrev=0 "$tag^" 2>/dev/null || true)
          compareLink=""
          if [ -n "$prevTag" ]; then
            compareLink="**Full changelog:** [$prevTag...$tag](https://github.com/hardcoreerik/TheOrc/compare/$prevTag...$tag)"
          fi

          cat > release-notes.md <<EOF
          <div align="center">
          <img src="https://raw.githubusercontent.com/hardcoreerik/TheOrc/master/Assets/release.png" width="480" alt="TheOrc — Build Complete"/>
          </div>

          ## TheOrc $tag

          > 100% local AI coding assistant — no cloud, no subscriptions, no data leaving your machine.

          ---

          ### What's new in $tag

          $whatsNew

          ---

          ### 🪟 Windows — one-click install (recommended)
          1. Download **OrchestratorSetup.exe** below
          2. Run it — the wizard detects your GPU, downloads the right runtime and model, configures everything
          3. Launch from the Desktop shortcut or Start Menu

          **Portable**: download \`TheOrc-$ver-win-x64-portable.zip\` instead — contains both \`OrchestratorIDE.exe\` and \`OrchestratorSetup.exe\`, extract both to the same folder, run \`OrchestratorIDE.exe\`.

          ### 🍎 macOS (Apple Silicon)
          1. Download **OrchestratorSetup** below (no extension)
          2. In Terminal: \`chmod +x OrchestratorSetup && ./OrchestratorSetup\`
          3. **First launch will show a Gatekeeper warning** ("cannot be opened because the developer cannot be verified") — this build isn't code-signed yet. Right-click the file → Open, or run \`xattr -d com.apple.quarantine OrchestratorSetup\` first.
          4. The wizard detects your hardware, downloads the right runtime and model, configures everything

          **Portable**: download \`TheOrc-$ver-osx-arm64-portable.tar.gz\` instead — \`tar -xzf\` it, both binaries are already executable.

          Intel Macs (\`osx-x64\`) aren't built yet — only Apple Silicon.

          ### 🐝 Warband (headless HIVE node, no GUI)
          Deploy \`theorc-warband\` on any machine you want to join your HIVE without opening the
          full app — a cloud box, a home-lab server, a Raspberry Pi. Download the binary for your
          OS below, \`chmod +x theorc-warband\`, then either run it directly or set it up as a
          systemd service (Linux) / launchd agent (macOS) so it survives reboots. See
          \`--show-identity\` and \`--pair --target <host> --expect-fingerprint "<phrase>"\` for
          joining an existing HIVE headlessly.

          ### 🖥️ System requirements
          | | |
          |---|---|
          | **OS** | Windows 10/11 (x64) · macOS (Apple Silicon) |
          | **.NET** | Not required — fully self-contained |
          | **GPU** | NVIDIA RTX (CUDA 12) · AMD (Vulkan) · Apple Silicon (Metal) · CPU-only (AVX2 / baseline) |
          | **RAM** | 8 GB minimum · 16 GB recommended |

          ---

          $compareLink

          *Built from \`$tag\` · .NET 10 · [Source](https://github.com/hardcoreerik/TheOrc) · [Support the Orc ☕](https://ko-fi.com/hardcoreerik)*
