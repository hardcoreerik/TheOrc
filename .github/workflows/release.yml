name: Release

# Fires when a version tag is pushed: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v[0-9]*'

  # Allow manual trigger from GitHub Actions UI (useful for testing)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write   # needed to create GitHub releases and upload assets

jobs:
  build-and-release:
    name: Build & Release
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git describe works

      # ── 2. Resolve version ───────────────────────────────────────────────────
      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            $tag = '${{ github.event.inputs.tag }}'
          } else {
            $tag = $env:GITHUB_REF -replace '^refs/tags/', ''
          }
          $ver = $tag -replace '^v', ''
          echo "TAG=$tag"       >> $env:GITHUB_OUTPUT
          echo "VERSION=$ver"   >> $env:GITHUB_OUTPUT
          Write-Host "Building tag=$tag  version=$ver"

      # ── 3. Install .NET 10 ───────────────────────────────────────────────────
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ── 4. Restore ───────────────────────────────────────────────────────────
      - name: Restore
        run: dotnet restore OrchestratorIDE.slnx

      # ── 5. Publish OrchestratorIDE (main app) ────────────────────────────────
      - name: Publish OrchestratorIDE
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.VERSION }}'
          dotnet publish OrchestratorIDE/OrchestratorIDE.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:Version=$ver `
            -p:AssemblyVersion=$ver `
            -p:FileVersion=$ver `
            --output publish/app

      # ── 6. Publish OrchestratorSetup (installer) ─────────────────────────────
      - name: Publish OrchestratorSetup
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.VERSION }}'
          dotnet publish OrchestratorSetup/OrchestratorSetup.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:Version=$ver `
            -p:AssemblyVersion=$ver `
            -p:FileVersion=$ver `
            --output publish/setup

      # ── 7. List outputs (diagnostics) ────────────────────────────────────────
      - name: List published files
        shell: pwsh
        run: |
          Get-ChildItem publish -Recurse -File |
            Select-Object FullName, @{N='MB';E={[math]::Round($_.Length/1MB,1)}} |
            Format-Table -AutoSize

      # ── 8. Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.version.outputs.TAG }}
          name:       TheOrc ${{ steps.version.outputs.TAG }}
          draft:      false
          prerelease: false
          generate_release_notes: true
          body: |
            ## TheOrc ${{ steps.version.outputs.TAG }}

            ### Installation
            Download **OrchestratorSetup.exe** and run it.
            The installer detects your GPU, downloads the right llama.cpp runtime and GGUF model,
            and sets everything up in one click.

            ### Manual / portable install
            Download **OrchestratorIDE.exe** directly if you already have a runtime and model configured.

            ---
            *Built with .NET 10 — Windows x64 only. No .NET installation required.*
          files: |
            publish/app/OrchestratorIDE.exe
            publish/setup/OrchestratorSetup.exe
